name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint/test dependencies
        # Motif detectors + leakage tests need only these — no torch/CUDA in CI,
        # keeping the pipeline fast. The full stack is in requirements.txt.
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy networkx

      - name: Ruff (lint)
        run: ruff check src tests app

      - name: Ruff (format check)
        run: ruff format --check src tests app

      - name: Pytest (motif detectors + temporal-leakage guard)
        run: pytest tests -q

  docker-build:
    # Prove the reproducible image builds on clean linux/amd64. No push.
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: aml-graph:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
